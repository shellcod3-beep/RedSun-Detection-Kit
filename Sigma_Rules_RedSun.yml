# -----------------------------------------------------------------------------
# RULE 7: EICAR file created in TEMP followed by VSS snapshot (correlate in SIEM)
# -----------------------------------------------------------------------------
title: RedSun - EICAR Drop in TEMP Correlated with VSS Snapshot Creation
id: f4a9c3e1-0007-4f8a-91bc-3e4d5a6b7c8d
status: experimental
description: >
  Detects a Volume Shadow Copy snapshot being created within 30 seconds of an
  EICAR test file appearing in a %TEMP% subdirectory. This matches the first
  phase of the RedSun exploit where EICAR is deliberately written to trigger
  Windows Defender's pre-quarantine VSS behavior.
  NOTE: This rule requires SIEM-level correlation between file events and
  VSS/WMI events. Implement as a time-windowed join in Splunk or Elastic.
  Splunk example:
    index=sysmon EventCode=11 TargetFilename="*\\Temp\\RS-*"
    | join type=inner max=1
      [ search index=wmi EventCode=19 CommandLine="*shadow*" ]
    | where abs(_time - _time2) < 30
author: Mahmoud Saeed
date: 2026/04/18
tags:
  - attack.defense_evasion
  - attack.t1490
logsource:
  product: windows
  service: system
detection:
  vss_snapshot:
    EventID: 8193
    Provider_Name: 'VSS'
  condition: vss_snapshot
  # Correlate externally with file_event for EICAR in %TEMP%\RS-* within 30s
falsepositives:
  - Legitimate backup software triggering VSS near coincidental temp file activity
level: medium
